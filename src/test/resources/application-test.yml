spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: platform-auth
              uri: ${PLATFORM_URI:http://localhost:8081}
              predicates:
                - Path=/oauth2/**,/login/**,/auth/**,/users/**

JWT_SECRET: "test-secret-please-change-min-32-bytes-long-0123456789"
CORS_ALLOWED_ORIGINS: "http://localhost:5173"

management:
  endpoints:
    web:
      exposure:
        include: health
