spring:
  application:
    name: devpath-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes: []
          # 도메인 서비스 라우팅은 서비스 가동 시점에 추가한다. 예:
          # - id: learning
          #   uri: http://devpath-learning-svc:8080
          #   predicates:
          #     - Path=/api/learning/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway
